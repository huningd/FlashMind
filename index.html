<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FlashMind Lernkarten</title>
  <meta name="description" content="Lerne effizient mit Karteikarten." />

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="apple-touch-icon" href="https://picsum.photos/192/192" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#10b981',
            danger: '#ef4444',
          }
        }
      }
    }
  </script>
  <style>
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    body {
      background-color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: background-color 0.3s ease;
    }

    .dark body {
      background-color: #111827;
      /* gray-900 */
      color: #f3f4f6;
    }

    /* Basic Markdown Styling */
    .markdown-body {
      line-height: 1.6;
      word-wrap: break-word;
    }

    .markdown-body h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    .markdown-body h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 0.8rem;
      margin-bottom: 0.4rem;
    }

    .markdown-body h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 0.6rem;
      margin-bottom: 0.3rem;
    }

    .markdown-body p {
      margin-bottom: 0.5rem;
    }

    .markdown-body ul {
      list-style-type: disc;
      padding-left: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .markdown-body ol {
      list-style-type: decimal;
      padding-left: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .markdown-body code {
      background-color: #f3f4f6;
      padding: 0.1rem 0.3rem;
      border-radius: 0.2rem;
      font-family: monospace;
      font-size: 0.9em;
    }

    .dark .markdown-body code {
      background-color: #374151;
    }

    .markdown-body pre {
      background-color: #f3f4f6;
      padding: 0.5rem;
      border-radius: 0.4rem;
      overflow-x: auto;
      margin-bottom: 0.5rem;
    }

    .dark .markdown-body pre {
      background-color: #1f2937;
    }

    .markdown-body pre code {
      background-color: transparent;
      padding: 0;
    }

    .markdown-body blockquote {
      border-left: 4px solid #e5e7eb;
      padding-left: 1rem;
      color: #6b7280;
      font-style: italic;
      margin-bottom: 0.5rem;
    }

    .dark .markdown-body blockquote {
      border-left-color: #4b5563;
      color: #9ca3af;
    }

    .markdown-body strong {
      font-weight: 700;
    }

    .markdown-body em {
      font-style: italic;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0.5rem;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid #e5e7eb;
      padding: 0.4rem;
      text-align: left;
    }

    .dark .markdown-body th,
    .dark .markdown-body td {
      border-color: #374151;
    }

    .markdown-body th {
      background-color: #f9fafb;
      font-weight: 600;
    }

    .dark .markdown-body th {
      background-color: #1f2937;
    }
  </style>

  <!-- SQL.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

  <!-- Theme Init Script to prevent flash -->
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "localforage": "https://esm.sh/localforage@^1.10.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
